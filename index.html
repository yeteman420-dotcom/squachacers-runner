<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SquachAcers: Space Runner Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-bright:#FFD700;--deep:#050510;--red:#ff3333;--cyan:#00ffff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none;touch-action:none;}
  #gc{position:relative;width:min(500px,100vw);height:min(700px,100vh);overflow:hidden;border:1px solid #333;}
  canvas{width:100%;height:100%;display:block;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 0;pointer-events:none;z-index:10;}
  .hb{display:flex;flex-direction:column;align-items:center;}
  .hl{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:2px;color:var(--gold);opacity:0.7;}
  .hv{font-family:'Black Ops One',cursive;font-size:22px;color:#fff;text-shadow:0 0 10px var(--gold);}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px;text-align:center;}
  #ss{background:radial-gradient(ellipse at center,#0a0015 0%,#000 100%);}
  #gs{background:rgba(0,0,10,0.97);display:none;overflow-y:auto;}
  .logo{font-family:'Black Ops One',cursive;font-size:36px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold);letter-spacing:3px;margin-bottom:4px;}
  .sub{font-family:'Black Ops One',cursive;font-size:13px;color:#aaa;letter-spacing:5px;margin-bottom:18px;}
  .art{font-size:68px;margin:6px 0;animation:fly 2s ease-in-out infinite;}
  @keyframes fly{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-10px) rotate(5deg);}}
  .desc{font-size:12px;color:#777;letter-spacing:1px;margin-bottom:20px;line-height:1.9;}
  .btn{font-family:'Black Ops One',cursive;font-size:15px;letter-spacing:3px;padding:13px 36px;border:2px solid var(--gold);background:transparent;color:var(--gold-bright);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn::before{content:'';position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity 0.2s;}
  .btn:hover::before{opacity:0.15;}
  .btn:active{transform:scale(0.96);}
  .ot{font-family:'Black Ops One',cursive;font-size:40px;color:var(--red);text-shadow:0 0 30px var(--red);margin-bottom:6px;}
  .os{font-size:12px;color:#666;letter-spacing:3px;margin-bottom:14px;}
  .sd{font-family:'Black Ops One',cursive;font-size:48px;color:var(--gold-bright);text-shadow:0 0 20px var(--gold);margin-bottom:2px;}
  .sl{font-size:10px;letter-spacing:4px;color:#555;margin-bottom:14px;}
  .popup{position:absolute;font-family:'Black Ops One',cursive;font-size:16px;color:var(--gold-bright);pointer-events:none;animation:fu 0.9s ease-out forwards;z-index:30;text-shadow:0 0 8px var(--gold);}
  @keyframes fu{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-55px) scale(1.3);}}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;margin-bottom:3px;font-family:'Black Ops One',cursive;font-size:12px;letter-spacing:1px;border-left:3px solid transparent;}
  .lb-row.gold{border-color:#FFD700;background:rgba(255,215,0,0.08);}
  .lb-row.silver{border-color:#aaa;background:rgba(200,200,200,0.05);}
  .lb-row.bronze{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
  .lb-row.normal{border-color:#333;background:rgba(255,255,255,0.03);}
  .lb-row.hl2{border-color:#C9A84C;background:rgba(201,168,76,0.12);}
  .lbr{color:#C9A84C;width:22px;}.lbn{color:#fff;flex:1;padding:0 6px;}.lbs{color:#FFD700;}.lbd{color:#555;font-size:9px;margin-left:5px;}
  .lbt{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:4px;color:#C9A84C;text-align:center;margin-bottom:6px;opacity:0.8;}
  #ne{display:none;flex-direction:column;align-items:center;margin-bottom:12px;}
  #ni{font-family:'Black Ops One',cursive;font-size:16px;letter-spacing:3px;background:rgba(0,0,0,0.6);border:2px solid #C9A84C;color:#FFD700;padding:9px 14px;text-align:center;outline:none;width:210px;text-transform:uppercase;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="hb"><div class="hl">SCORE</div><div class="hv" id="sc">0</div></div>
    <div class="hb"><div class="hl">WAVE</div><div class="hv" id="waveHud">1</div></div>
    <div class="hb"><div class="hl">DIST</div><div class="hv" id="dc">0m</div></div>
  </div>

  <div class="screen" id="ss" style="justify-content:flex-start;padding-top:26px;overflow-y:auto;">
    <div class="logo">SQUACHACERS</div>
    <div class="sub">SPACE RUNNER ELITE</div>
    <div class="art">🦶</div>
    <div class="desc">
      <span style="color:#ff3333; font-weight:700;">DANGER: ADAPTIVE AI ACTIVE</span><br>
      ← SWIPE LEFT/RIGHT → DODGE<br>
      ↑ SWIPE UP → BARREL ROLL (INVINCIBLE)<br>
      TAP → BLAST ENEMIES · PROTECT YOUR TREES 🌲
    </div>
    <button class="btn" id="startBtn">BLAST OFF</button>
    <div style="font-size:11px;color:#444;letter-spacing:2px;margin-top:10px;">BEST: <span id="hsS">0</span></div>
    <div id="slb" style="width:100%;max-width:320px;margin-top:10px;"></div>
  </div>

  <div class="screen" id="gs">
    <div class="ot">OBLITERATED</div>
    <div class="os">SQUACH DOWN</div>
    <div class="sd" id="fs">0</div>
    <div class="sl">POINTS</div>
    <div style="font-size:11px;color:#444;letter-spacing:2px;margin-bottom:12px;">BEST: <span id="hsG">0</span></div>
    <div id="ne">
      <div style="font-family:'Black Ops One',cursive;font-size:10px;letter-spacing:3px;color:#C9A84C;margin-bottom:8px;">NEW HIGH SCORE — ENTER NAME</div>
      <input id="ni" type="text" maxlength="12" placeholder="YOUR NAME">
      <button class="btn" id="saveBtn" style="margin-top:10px;padding:9px 24px;font-size:12px;">SAVE</button>
    </div>
    <div id="lb" style="width:100%;max-width:320px;margin-bottom:16px;"></div>
    <button class="btn" id="retryBtn">FLY AGAIN</button>
  </div>
</div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import{getDatabase,ref,push,query,orderByChild,limitToLast,onValue}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
  const db=getDatabase(initializeApp({apiKey:"AIzaSyCSBF47ibk5F0TCZ1DvwZb7-0cG1BImDd4",authDomain:"squachacers.firebaseapp.com",databaseURL:"https://squachacers-default-rtdb.firebaseio.com",projectId:"squachacers",storageBucket:"squachacers.firebasestorage.app",messagingSenderId:"305836513755",appId:"1:305836513755:web:2d9a412923e817a6ee2ffe"}));
  window._fbL=cb=>onValue(query(ref(db,'runner_scores'),orderByChild('score'),limitToLast(10)),s=>{const d=s.val();cb(d?Object.values(d).sort((a,b)=>b.score-a.score):[]);});
  window._fbS=(n,s,d)=>push(ref(db,'runner_scores'),{name:n.toUpperCase().trim()||'ACER',score:s,dist:d,date:Date.now()});
  document.dispatchEvent(new Event('fbReady'));
</script>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=500,H=700;
canvas.width=W;canvas.height=H;

const LANES=3,LANE_W=W/LANES,SY=H-130;
function laneX(l){return LANE_W*l+LANE_W/2;}

const GUN_RATE=0.2;

let state='start',score=0,dist=0,hiScore=parseInt(localStorage.getItem('sr2_hs')||'0');
let gameTime=0,speed=0;
let tLane=1,curLane=1,sqX=laneX(1),velX=0,tunnelZ=0;
let rolling=false,rollA=0,rollDir=0,rollCD=0;
const ROLL_DUR=0.45,ROLL_CD=1.0;
let gunCD=0;
let beams=[],obs=[],parts=[],rings=[];
let spawnT=0,lastT=0,shake=0,inv=0,lives=3,maxLives=3;
let globalScores=[];
let txS=0,tyS=0,tmoved=false,tdir='';

const WAVE_DUR=[15,20,26,32,38,44,50];
let wave=1,waveT=0,waveBanner='',waveBannerT=0;

let rapid=false,rapidT=0,rapidFireT=0;
const RAPID_DUR=6;
let lastHeart=0;

// Galaga layer
let attackers=[],attackSpawnT=3,missiles=[];

// Warp stars
const STAR_COUNT=220;
let warpStars=[];
function initStars(){
  warpStars=[];
  for(let i=0;i<STAR_COUNT;i++)warpStars.push(newStar(true));
}
function newStar(randomZ=false){
  return{x:(Math.random()-0.5)*W*3,y:(Math.random()-0.5)*H*3,z:randomZ?Math.random()*W:W,r:Math.random()*2.2+0.3,col:Math.random()<0.06?`hsl(${Math.random()*60+180},80%,80%)`:'#fff'};
}
initStars();

let AC=null,mN={},mPlay=false,muteBtn;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,tp,dur,vol=0.22,delay=0){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=tp;o.frequency.setValueAtTime(f,ac.currentTime+delay);g.gain.setValueAtTime(0,ac.currentTime+delay);g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.05);}catch(e){}}
function noise(dur,vol,lpf=400){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=lpf;s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(vol,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);s.start();s.stop(ac.currentTime+dur+0.05);}catch(e){}}
function sfxShoot(){tone(700,'sawtooth',0.04,0.18);tone(1100,'sine',0.03,0.1,0.02);}
function sfxHit(){noise(0.12,0.45,600);}
function sfxExplode(){noise(0.28,0.6,200);}
function sfxDie(){[350,250,160,80].forEach((f,i)=>tone(f,'sawtooth',0.35,0.4,i*0.18));}
function sfxPickup(){[700,900,1100].forEach((f,i)=>tone(f,'sine',0.1,0.22,i*0.06));}
function sfxLane(){tone(350,'sine',0.05,0.1);}
function sfxRoll(){tone(500,'sawtooth',0.04,0.1);tone(750,'sine',0.07,0.15,0.04);}
function sfxHeart(){[500,650,850].forEach((f,i)=>tone(f,'sine',0.18,0.3,i*0.07));}
function sfxWave(){[200,300,420,540].forEach((f,i)=>tone(f,'square',0.18,0.22,i*0.06));}

function startMusic(){
  if(mPlay)return;const ac=getAC();mPlay=true;
  const mg=ac.createGain();mg.gain.value=0.11;mg.connect(ac.destination);mN.m=mg;
  const step=60/148/4;
  const bass=[41,41,55,41,49,41,55,49];let bs=0,bt=ac.currentTime+0.1;
  function sBass(){if(!mPlay)return;while(bt<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=320;o.type='sawtooth';o.frequency.value=bass[bs%8];o.connect(f);f.connect(g);g.connect(mg);g.gain.setValueAtTime(0,bt);g.gain.linearRampToValueAtTime(0.8,bt+0.01);g.gain.exponentialRampToValueAtTime(0.001,bt+step*1.8);o.start(bt);o.stop(bt+step*2.2);bs++;bt+=step*2;}mN.bT=setTimeout(sBass,150);}
  const arp=[311,392,466,554,466,392,311,261,294,370,440,523,440,370,294,247];let as=0,at=ac.currentTime+0.1;
  function sArp(){if(!mPlay)return;while(at<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=arp[as%16];o.connect(g);g.connect(mg);g.gain.setValueAtTime(0,at);g.gain.linearRampToValueAtTime(0.14,at+0.005);g.gain.exponentialRampToValueAtTime(0.001,at+step*0.7);o.start(at);o.stop(at+step);as++;at+=step;}mN.aT=setTimeout(sArp,150);}
  let kt=ac.currentTime+0.1;
  function sKick(){if(!mPlay)return;while(kt<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(160,kt);o.frequency.exponentialRampToValueAtTime(38,kt+0.09);o.connect(g);g.connect(mg);g.gain.setValueAtTime(1.4,kt);g.gain.exponentialRampToValueAtTime(0.001,kt+0.24);o.start(kt);o.stop(kt+0.3);kt+=step*8;}mN.kT=setTimeout(sKick,150);}
  let ht=ac.currentTime+0.1;
  function sHat(){if(!mPlay)return;while(ht<ac.currentTime+0.4){const buf=ac.createBuffer(1,ac.sampleRate*0.025,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=10000;s.buffer=buf;s.connect(f);f.connect(g);g.connect(mg);g.gain.setValueAtTime(0.22,ht);g.gain.exponentialRampToValueAtTime(0.001,ht+0.025);s.start(ht);s.stop(ht+0.03);ht+=step*2;}mN.hT=setTimeout(sHat,150);}
  sBass();sArp();sKick();sHat();
}
function stopMusic(){mPlay=false;['bT','aT','kT','hT'].forEach(k=>clearTimeout(mN[k]));if(mN.m)try{mN.m.gain.linearRampToValueAtTime(0,AC.currentTime+0.2);}catch(e){}mN={};}
function toggleMute(){if(mPlay){stopMusic();muteBtn.textContent='🔇';}else{startMusic();muteBtn.textContent='🔊';}}

function getLocal(){try{return JSON.parse(localStorage.getItem('sr2_sc')||'[]');}catch(e){return[];}}
function saveLocal(s){localStorage.setItem('sr2_sc',JSON.stringify(s));}
function isHigh(s){const sc=globalScores.length?globalScores:getLocal();return sc.length<10||s>(sc[sc.length-1]?.score||0);}
function renderLB(id,hl=null){
  const sc=globalScores.length?globalScores:getLocal();
  const el=document.getElementById(id);if(!el)return;
  if(!sc.length){el.innerHTML='<div class="lbt" style="color:#333;">NO SCORES YET — BE FIRST</div>';return;}
  const m=['gold','silver','bronze'];
  el.innerHTML='<div class="lbt">🌍 HALL OF ACERS</div>'+sc.map((s,i)=>`<div class="lb-row ${m[i]||(s.score===hl?'hl2':'normal')}"><span class="lbr">${i===0?'👑':'#'+(i+1)}</span><span class="lbn">${s.name}</span><span class="lbs">${s.score.toLocaleString()}</span><span class="lbd">${s.dist||0}m</span></div>`).join('');
}
document.addEventListener('fbReady',()=>{if(window._fbL)window._fbL(s=>{globalScores=s;renderLB('lb');renderLB('slb');});});

// HARDENED SPAWN LOGIC
function spawnAlien(){
  const lane=Math.floor(Math.random()*LANES);
  const baseSpd=170+wave*22;
  const roll=Math.random();
  
  if(roll<0.25) {
      // Interceptor (Elite)
      obs.push({type:'alien',subtype:'interceptor',lane,x:laneX(lane),y:-30,vy:baseSpd*1.7,size:15,hp:1,maxHp:1,wobble:Math.random()*Math.PI*2,color:'#ff2288',score:80, weave: true});
  } else if(roll<0.50) {
      // Cruiser (Sniper)
      obs.push({type:'alien',subtype:'cruiser',lane,x:laneX(lane),y:-44,vy:baseSpd,size:28,hp:1,maxHp:1,wobble:Math.random()*Math.PI*2,color:'#44ff88',score:50, canShoot: true, shotT: 1.5});
  } else if(roll<0.75) {
      // Dreadnought (Rage Tank)
      let dHP = 2+Math.floor(wave/2);
      obs.push({type:'alien',subtype:'dreadnought',lane,x:laneX(lane),y:-55,vy:baseSpd*0.4,size:38,hp:dHP,maxHp:dHP,wobble:Math.random()*Math.PI*2,color:'#ff8800',score:120+wave*15,big:true, rage: false});
  } else {
      // Phantom (Ghost)
      obs.push({type:'alien',subtype:'phantom',lane,x:laneX(lane),y:-38,vy:baseSpd*1.1,size:24,hp:2,maxHp:2,wobble:Math.random()*Math.PI*2,color:'#cc44ff',score:100, flickerT: 0, isGhost: false});
  }
}

function popup(x,y,val){
  const el=document.createElement('div');el.className='popup';
  el.textContent=typeof val==='number'?'+'+val:val;
  const rc=canvas.getBoundingClientRect();
  el.style.left=(rc.left+x*(rc.width/W))+'px';
  el.style.top=(rc.top+y*(rc.height/H))+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}
function spawnParts(x,y,color,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=50+Math.random()*140;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.6+Math.random()*0.9,size:2+Math.random()*4,color});}}
function spawnRing(x,y,color){rings.push({x,y,r:5,maxR:60,life:1,color});}

function updateAttackers(dt){
  if(wave>=2){
    attackSpawnT-=dt;
    if(attackSpawnT<=0){
      if(Math.random()<0.7)spawnAttacker();
      attackSpawnT=Math.max(3.5,8-wave*0.5)*(0.7+Math.random()*0.6);
    }
  }
  for(let i=attackers.length-1;i>=0;i--){
    const a=attackers[i];
    a.t+=dt;
    const prevX=a.x,prevY=a.y;

    if(a.phase==='enter'){
      const dur=1.4,p=Math.min(1,a.t/dur);
      const ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      const cpX=a.fromLeft?a.cx*0.3:W-a.cx*0.3,cpY=a.cy-80;
      a.x=Math.pow(1-ease,2)*a.startX+2*(1-ease)*ease*cpX+ease*ease*a.cx;
      a.y=Math.pow(1-ease,2)*a.startY+2*(1-ease)*ease*cpY+ease*ease*a.cy;
      if(a.t>=dur){a.phase='loop';a.t=0;}
    } else if(a.phase==='loop'){
      const A=70+wave*4,B=35+wave*2,spd=1.8+wave*0.1,lt=a.t*spd;
      const denom=1+Math.pow(Math.sin(lt),2);
      a.x=a.cx+A*Math.cos(lt)/denom;
      a.y=a.cy+B*Math.sin(lt)*Math.cos(lt)/denom;
      if(a.t*spd>=Math.PI*2*a.maxLoops){a.phase='aim';a.t=0;a.aimX=sqX;}
    } else if(a.phase==='aim'){
      a.x+=(sqX-a.x)*dt*1.5;
      a.y+=Math.sin(a.t*12)*0.5;
      if(a.t>=0.5){
        a.phase='dive';a.t=0;
        missiles.push({x:a.x,y:a.y+a.size,vx:(sqX-a.x)*0.8,vy:420+wave*18,life:1,color:a.color,size:5});
      }
    } else if(a.phase==='dive'){
      const diveSpd=380+wave*20;
      a.y+=diveSpd*dt;
      a.x+=(a.aimX-a.x)*dt*3;
      if(a.t>0.25&&!a._firedMid){
        a._firedMid=true;
        missiles.push({x:a.x,y:a.y+a.size,vx:(sqX-a.x)*0.5,vy:380+wave*15,life:1,color:a.color,size:5});
      }
      if(a.y>H+60){attackers.splice(i,1);continue;}
    }

    const dx=a.x-prevX,dy=a.y-prevY;
    if(Math.abs(dx)+Math.abs(dy)>0.1)a.angle=Math.atan2(dy,dx)+Math.PI/2;
    a.trail.push({x:a.x,y:a.y});
    if(a.trail.length>10)a.trail.shift();

    let dead=false;
    for(let j=beams.length-1;j>=0;j--){
      if(Math.hypot(beams[j].x-a.x,beams[j].y-a.y)<a.size+6){
        a.hp--;sfxHit();spawnParts(beams[j].x,beams[j].y,a.color,6);
        beams.splice(j,1);
        if(a.hp<=0){sfxExplode();spawnParts(a.x,a.y,a.color,22);spawnRing(a.x,a.y,a.color);score+=a.score;popup(a.x,a.y,a.score);attackers.splice(i,1);dead=true;}
        break;
      }
    }
    if(dead)continue;

    if(inv<=0&&Math.hypot(a.x-sqX,a.y-SY)<a.size+10){
      lives--;inv=1.5;shake=1.0;sfxHit();
      spawnParts(sqX,SY,'#ff3333',20);spawnRing(sqX,SY,'#ff3333');
      attackers.splice(i,1);
      if(lives<=0){gameOver();return;}
    }
  }

  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    m.x+=m.vx*dt;m.y+=m.vy*dt;m.life-=dt*0.4;
    if(m.y>H+20||m.life<=0){missiles.splice(i,1);continue;}
    if(inv<=0&&Math.hypot(m.x-sqX,m.y-SY)<m.size+12){
      lives--;inv=1.5;shake=0.9;sfxHit();
      spawnParts(sqX,SY,'#ff3333',16);spawnRing(sqX,SY,'#ff3333');
      missiles.splice(i,1);
      if(lives<=0){gameOver();return;}
    }
  }
}

// INPUT
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='playing')return;txS=e.touches[0].clientX;tyS=e.touches[0].clientY;tmoved=false;tdir='';},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();if(state!=='playing')return;
  const dx=e.touches[0].clientX-txS,dy=e.touches[0].clientY-tyS;
  if(!tmoved&&(Math.abs(dx)>14||Math.abs(dy)>14)){
    tmoved=true;
    if(Math.abs(dy)>Math.abs(dx)&&dy<-14){tdir='up';doRoll();}
    else if(Math.abs(dx)>Math.abs(dy)){tdir='x';velX+=dx*18;sfxLane();txS=e.touches[0].clientX;}
  } else if(tmoved&&tdir==='x'){
    const dx2=e.touches[0].clientX-txS;
    if(Math.abs(dx2)>8){velX+=dx2*12;txS=e.touches[0].clientX;}
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(state==='playing'&&!tmoved)shoot();},{passive:false});
document.addEventListener('keydown',e=>{
  if(state!=='playing')return;
  if(e.key==='ArrowLeft'){velX-=380;sfxLane();}
  if(e.key==='ArrowRight'){velX+=380;sfxLane();}
  if(e.key==='ArrowUp'||e.key==='w')doRoll();
  if(e.key===' '){e.preventDefault();shoot();}
});

function doRoll(){
  if(rolling||rollCD>0)return;
  rolling=true;rollA=0;rollDir=sqX>W/2?-1:1;
  inv=Math.max(inv,ROLL_DUR+0.1);sfxRoll();spawnParts(sqX,SY,'#00ffff',8);
}
function shoot(){
  if(gunCD>0)return;
  gunCD=rapid?0.04:GUN_RATE;sfxShoot();
  let best=null,bd=Infinity;
  for(const o of obs){if(o.type==='powerup')continue;const d=Math.hypot(o.x-sqX,o.y-SY);if(d<bd){bd=d;best=o;}}
  for(const a of attackers){const d=Math.hypot(a.x-sqX,a.y-SY);if(d<bd){bd=d;best={x:a.x,y:a.y};}}
  const tx=best?best.x:sqX,adx=(tx-sqX)*0.2;
  const col=rapid?'#ff5500':'#00ffff';
  beams.push({x:sqX-22,y:SY-5,vx:adx-6,vy:-700,age:0,col});
  beams.push({x:sqX+22,y:SY-5,vx:adx+6,vy:-700,age:0,col});
}

// DRAWING WRAPPERS
function drawBg(t){
  ctx.fillStyle='#000005';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H*0.45,warpSpeed=speed*0.9;
  for(const s of warpStars){
    const sx=(s.x/s.z)*W+cx,sy=(s.y/s.z)*H*0.7+cy;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20||s.z<=0){Object.assign(s,newStar(false));continue;}
    const prevSx=(s.x/Math.min(s.z+warpSpeed*0.016,W))*W+cx;
    const prevSy=(s.y/Math.min(s.z+warpSpeed*0.016,W))*H*0.7+cy;
    const brightness=Math.max(0,1-s.z/W),size=Math.max(0.4,(1-s.z/W)*2.5);
    ctx.globalAlpha=brightness*0.9;
    if(brightness>0.3){
      ctx.strokeStyle=s.col;ctx.lineWidth=size;ctx.shadowBlur=rapid?4:0;ctx.shadowColor=s.col;
      ctx.beginPath();ctx.moveTo(prevSx,prevSy);ctx.lineTo(sx,sy);ctx.stroke();
    } else {ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,Math.max(0.3,size*0.5),0,Math.PI*2);ctx.fill();}
  }
  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

function update(dt,t){
  if(isNaN(dt)||dt>0.1)dt=0.016;
  speed=Math.min(500,160+gameTime*4+wave*12);
  gameTime+=dt;dist+=speed*dt/10;
  score=Math.floor(dist*2+wave*50);

  const wdur=WAVE_DUR[Math.min(wave-1,WAVE_DUR.length-1)];
  waveT+=dt;
  if(waveT>=wdur){
    waveT=0;wave++;waveBanner=`WAVE ${wave}`;waveBannerT=2.2;sfxWave();
    obs=obs.filter(o=>o.type==='powerup');attackers=[];missiles=[];
  }
  if(waveBannerT>0)waveBannerT-=dt;

  if(gunCD>0)gunCD-=dt;
  if(rapid){rapidT-=dt;if(rapidT<=0){rapid=false;rapidT=0;}rapidFireT-=dt;if(rapidFireT<=0){rapidFireT=0.04;shoot();}}

  for(const s of warpStars){s.z-=speed*0.9*dt;if(s.z<=1)Object.assign(s,newStar(false));}

  velX*=Math.pow(0.055,dt);sqX+=velX*dt;
  if(sqX<22)sqX=22; if(sqX>W-22)sqX=W-22;

  if(rolling){rollA+=dt*(Math.PI*2/ROLL_DUR);if(rollA>=Math.PI*2){rolling=false;rollA=0;rollCD=ROLL_CD;}}
  if(rollCD>0)rollCD-=dt;
  if(inv>0)inv-=dt;if(shake>0)shake-=dt*5;

  spawnT-=dt;
  if(spawnT<=0){spawnAlien();spawnT=Math.max(0.7,2.2-wave*0.1)*(0.6+Math.random()*0.8); if(Math.random()<0.1)spawnPowerup();}

  // HARDENED LOGIC FOR ENEMIES
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];o.y+=o.vy*dt;
    if(o.weave) o.x = laneX(o.lane) + Math.sin(t*6) * 45;
    if(o.subtype==='phantom'){ o.flickerT+=dt; o.isGhost = Math.sin(o.flickerT*12) > 0;}
    if(o.canShoot){ o.shotT-=dt; if(o.shotT<=0 && o.y < H-150){ missiles.push({x:o.x, y:o.y+20, vx:0, vy:o.vy+150, size:5, color:o.color, life: 1}); o.shotT=2.0;}}
    if(o.subtype==='dreadnought' && o.hp < o.maxHp/2 && !o.rage){ o.rage=true; o.vy*=1.8; o.color='#ff3300';}

    if(o.y>H+80){obs.splice(i,1);continue;}
    if(inv<=0 && !o.isGhost){
      if(Math.hypot(o.x-sqX,o.y-SY)<o.size+15){
        if(o.type==='powerup'){
          handlePowerup(o); obs.splice(i,1);
        } else {
          lives--;inv=1.5;shake=0.9;sfxHit();obs.splice(i,1);
          if(lives<=0)gameOver();
        }
      }
    }
  }

  // Beam logic with Ghost check
  for(let i=beams.length-1;i>=0;i--){
    const b=beams[i]; b.x+=b.vx*dt; b.y+=b.vy*dt;
    for(let j=obs.length-1;j>=0;j--){
      const o=obs[j]; if(o.type==='powerup' || o.isGhost)continue;
      if(Math.hypot(b.x-o.x, b.y-o.y)<o.size+10){
        o.hp--; beams.splice(i,1); sfxHit();
        if(o.hp<=0){score+=o.score; obs.splice(j,1); sfxExplode();}
        break;
      }
    }
  }

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay*dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.r+=150*dt;r.life-=dt*2.8;if(r.life<=0)rings.splice(i,1);}

  updateAttackers(dt);

  document.getElementById('sc').textContent=Math.floor(score);
  document.getElementById('dc').textContent=Math.floor(dist)+'m';
  document.getElementById('waveHud').textContent=wave;
}

function spawnPowerup() {
    const lane = Math.floor(Math.random()*LANES);
    obs.push({type:'powerup', subtype:['ammo','shield','boost','rapfire'][Math.floor(Math.random()*4)], lane, x:laneX(lane), y:-30, vy:180, size:20});
}

function handlePowerup(o) {
    if(o.subtype==='shield') inv=4;
    if(o.subtype==='rapfire') { rapid=true; rapidT=RAPID_DUR; }
    score += 100; sfxPickup(); popup(o.x, o.y, "POWER UP");
}

function drawObs(o,t){
  ctx.save();ctx.translate(o.x,o.y);
  if(o.isGhost) ctx.globalAlpha = 0.3;
  ctx.shadowBlur=o.big?28:16;ctx.shadowColor=o.color;
  ctx.fillStyle=o.color;
  if(o.type==='powerup'){
      ctx.beginPath(); ctx.arc(0,0,o.size,0,Math.PI*2); ctx.fill();
  } else if(o.subtype==='interceptor'){
      ctx.beginPath();ctx.moveTo(0,-o.size*1.4);ctx.lineTo(o.size*0.5,o.size);ctx.lineTo(-o.size*0.5,o.size);ctx.closePath();ctx.fill();
  } else if(o.subtype==='cruiser'){
      ctx.fillRect(-o.size/2, -o.size/4, o.size, o.size/2);
  } else {
      ctx.fillRect(-o.size/2, -o.size/2, o.size, o.size);
  }
  ctx.restore();
}

// RESTORING PLAYER AND HUD RENDERERS...
function drawSquach(t){
  const bob=rolling?0:Math.sin(t*7)*2.5;
  const tilt=rolling?rollDir*rollA*1.4:Math.max(-0.4,Math.min(0.4,velX*0.0005));
  ctx.save();ctx.translate(sqX,SY+bob);ctx.rotate(tilt);
  if(inv>0 && Math.floor(t*15)%2===0) ctx.globalAlpha = 0.3;
  ctx.fillStyle='#3a2a1a';ctx.beginPath();ctx.ellipse(0,2,14,19,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(-4,-22,2.8,0,Math.PI*2);ctx.arc(4,-22,2.8,0,Math.PI*2);ctx.fill();
  ctx.restore();
  
  // Trees
  for(let i=0;i<lives;i++){
    ctx.fillStyle='#228B22'; ctx.fillRect(10+i*25, H-30, 15, 20);
  }
}

function loop(ts){
  if(state!=='playing')return;
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;const t=ts/1000;
  update(dt,t);
  ctx.save();
  if(shake>0){const sh=shake*8;ctx.translate((Math.random()-0.5)*sh,(Math.random()-0.5)*sh);}
  drawBg(t);
  rings.forEach(r => { ctx.strokeStyle=r.color; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke(); });
  obs.forEach(o=>drawObs(o,t));
  attackers.forEach(a=>{ ctx.fillStyle=a.color; ctx.fillRect(a.x-10,a.y-10,20,20); });
  missiles.forEach(m=>{ ctx.fillStyle=m.color; ctx.beginPath(); ctx.arc(m.x,m.y,5,0,Math.PI*2); ctx.fill(); });
  beams.forEach(b=>{ ctx.fillStyle=b.col; ctx.fillRect(b.x-2, b.y-10, 4, 20); });
  drawSquach(t);
  ctx.restore();requestAnimationFrame(loop);
}

function startGame(){
  score=0;dist=0;gameTime=0;lives=3;obs=[];attackers=[];beams=[];state='playing';
  document.getElementById('ss').style.display='none';
  document.getElementById('gs').style.display='none';
  startMusic(); lastT=performance.now(); requestAnimationFrame(loop);
}

function gameOver(){
  state='gameover';stopMusic();sfxDie();
  document.getElementById('fs').textContent=score;
  document.getElementById('gs').style.display='flex';
  renderLB('lb', score);
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
renderLB('slb');
</script>
