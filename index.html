<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SquachAcers: Space Runner Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-bright:#FFD700;--deep:#050510;--red:#ff3333;--cyan:#00ffff;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none;touch-action:none;}
  #gc{position:relative;width:min(500px,100vw);height:min(700px,100vh);overflow:hidden;border:2px solid #222;}
  canvas{width:100%;height:100%;display:block;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 0;pointer-events:none;z-index:10;}
  .hb{display:flex;flex-direction:column;align-items:center;}
  .hl{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:2px;color:var(--gold);opacity:0.7;}
  .hv{font-family:'Black Ops One',cursive;font-size:22px;color:#fff;text-shadow:0 0 10px var(--gold);}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px;text-align:center;}
  #ss{background:radial-gradient(ellipse at center,#0a0015 0%,#000 100%);}
  #gs{background:rgba(0,0,10,0.97);display:none;overflow-y:auto;}
  .logo{font-family:'Black Ops One',cursive;font-size:36px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold);letter-spacing:3px;margin-bottom:4px;}
  .sub{font-family:'Black Ops One',cursive;font-size:13px;color:#aaa;letter-spacing:5px;margin-bottom:18px;}
  .art{font-size:68px;margin:6px 0;animation:fly 2s ease-in-out infinite;}
  @keyframes fly{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-10px) rotate(5deg);}}
  .desc{font-size:12px;color:#777;letter-spacing:1px;margin-bottom:20px;line-height:1.9;}
  .btn{font-family:'Black Ops One',cursive;font-size:15px;letter-spacing:3px;padding:13px 36px;border:2px solid var(--gold);background:transparent;color:var(--gold-bright);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn:hover{background:rgba(201,168,76,0.2);}
  .btn:active{transform:scale(0.96);}
  .ot{font-family:'Black Ops One',cursive;font-size:40px;color:var(--red);text-shadow:0 0 30px var(--red);margin-bottom:6px;}
  .os{font-size:12px;color:#666;letter-spacing:3px;margin-bottom:14px;}
  .sd{font-family:'Black Ops One',cursive;font-size:48px;color:var(--gold-bright);text-shadow:0 0 20px var(--gold);margin-bottom:2px;}
  .sl{font-size:10px;letter-spacing:4px;color:#555;margin-bottom:14px;}
  .popup{position:absolute;font-family:'Black Ops One',cursive;font-size:16px;color:var(--gold-bright);pointer-events:none;animation:fu 0.9s ease-out forwards;z-index:30;text-shadow:0 0 8px var(--gold);}
  @keyframes fu{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-55px) scale(1.3);}}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;margin-bottom:3px;font-family:'Black Ops One',cursive;font-size:12px;letter-spacing:1px;border-left:3px solid transparent;}
  .lb-row.gold{border-color:#FFD700;background:rgba(255,215,0,0.08);}
  .lb-row.hl2{border-color:#C9A84C;background:rgba(201,168,76,0.12);}
  .lbr{color:#C9A84C;width:22px;}.lbn{color:#fff;flex:1;padding:0 6px;}.lbs{color:#FFD700;}.lbd{color:#555;font-size:9px;margin-left:5px;}
  #ne{display:none;flex-direction:column;align-items:center;margin-bottom:12px;}
  #ni{font-family:'Black Ops One',cursive;font-size:16px;letter-spacing:3px;background:rgba(0,0,0,0.6);border:2px solid #C9A84C;color:#FFD700;padding:9px 14px;text-align:center;outline:none;width:210px;text-transform:uppercase;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="hb"><div class="hl">SCORE</div><div class="hv" id="sc">0</div></div>
    <div class="hb"><div class="hl">WAVE</div><div class="hv" id="waveHud">1</div></div>
    <div class="hb"><div class="hl">DIST</div><div class="hv" id="dc">0m</div></div>
  </div>

  <div class="screen" id="ss">
    <div class="logo">SQUACHACERS</div>
    <div class="sub">SPACE RUNNER ELITE</div>
    <div class="art">🦶</div>
    <div class="desc">
      <span style="color:#ff3333; font-weight:bold;">DANGER: ADAPTIVE AI ACTIVE</span><br>
      ← SWIPE TO MOVE / ↑ SWIPE TO ROLL<br>
      TAP TO BLAST · PROTECT THE TREES 🌲
    </div>
    <button class="btn" id="startBtn">BLAST OFF</button>
    <div id="slb" style="width:100%;max-width:320px;margin-top:15px;"></div>
  </div>

  <div class="screen" id="gs">
    <div class="ot">OBLITERATED</div>
    <div class="sd" id="fs">0</div>
    <div id="ne">
      <div style="font-family:'Black Ops One',cursive;font-size:10px;color:#C9A84C;margin-bottom:8px;">NEW HIGH SCORE</div>
      <input id="ni" type="text" maxlength="12" placeholder="NAME">
      <button class="btn" id="saveBtn" style="margin-top:10px;">SAVE</button>
    </div>
    <div id="lb" style="width:100%;max-width:320px;margin-bottom:16px;"></div>
    <button class="btn" id="retryBtn">TRY AGAIN</button>
  </div>
</div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import{getDatabase,ref,push,query,orderByChild,limitToLast,onValue}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
  const db=getDatabase(initializeApp({apiKey:"AIzaSyCSBF47ibk5F0TCZ1DvwZb7-0cG1BImDd4",authDomain:"squachacers.firebaseapp.com",databaseURL:"https://squachacers-default-rtdb.firebaseio.com",projectId:"squachacers"}));
  window._fbL=cb=>onValue(query(ref(db,'runner_scores'),orderByChild('score'),limitToLast(10)),s=>{const d=s.val();cb(d?Object.values(d).sort((a,b)=>b.score-a.score):[]);});
  window._fbS=(n,s,d)=>push(ref(db,'runner_scores'),{name:n.toUpperCase().trim()||'ACER',score:s,dist:d,date:Date.now()});
  document.dispatchEvent(new Event('fbReady'));
</script>

<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=500,H=700, LANES=3,LANE_W=W/LANES,SY=H-130;
function laneX(l){return LANE_W*l+LANE_W/2;}

let state='start',score=0,dist=0,hiScore=parseInt(localStorage.getItem('sr2_hs')||'0');
let gameTime=0,speed=160,tLane=1,sqX=laneX(1),velX=0;
let rolling=false,rollA=0,rollDir=0,rollCD=0,gunCD=0,inv=0,lives=3,maxLives=3;
let beams=[],obs=[],parts=[],rings=[],attackers=[],missiles=[],warpStars=[];
let wave=1,waveT=0,waveBanner='',waveBannerT=0,spawnT=0,shake=0,lastHeart=0;
let rapid=false,rapidT=0;
let globalScores=[];
let txS=0,tyS=0,tmoved=false,tdir='';

const WAVE_COLORS = ['#fff', '#0ff', '#0f0', '#ff0', '#f0f', '#f00'];

// Starfield
function initStars(){ warpStars=[]; for(let i=0;i<200;i++)warpStars.push({x:(Math.random()-0.5)*W*3,y:(Math.random()-0.5)*H*3,z:Math.random()*W,col:'#fff'}); }
initStars();

// Audio
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,tp,dur,vol=0.1){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.type=tp;o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(vol,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}}

// Hardened Spawning
function spawnAlien() {
  const lane = Math.floor(Math.random()*LANES);
  const baseSpd = 180 + wave * 25; 
  const roll = Math.random();
  
  if (roll < 0.25) {
    obs.push({type:'alien', subtype:'interceptor', lane, x:laneX(lane), y:-30, vy:baseSpd*1.7, size:16, hp:1, maxHp:1, color:'#ff2288', score:80, weave:true});
  } else if (roll < 0.55) {
    obs.push({type:'alien', subtype:'cruiser', lane, x:laneX(lane), y:-44, vy:baseSpd, size:28, hp:2, maxHp:2, color:'#44ff88', score:100, canShoot:true, shotT:1.5});
  } else if (roll < 0.80) {
    let dHP = 3 + Math.floor(wave/2);
    obs.push({type:'alien', subtype:'dreadnought', lane, x:laneX(lane), y:-60, vy:baseSpd*0.45, size:42, hp:dHP, maxHp:dHP, color:'#ff8800', score:250, big:true, rage:false});
  } else {
    obs.push({type:'alien', subtype:'phantom', lane, x:laneX(lane), y:-38, vy:baseSpd*1.2, size:24, hp:2, maxHp:2, color:'#cc44ff', score:150, flickerT:0, isGhost:false});
  }
}

function spawnPowerup() {
  const lane = Math.floor(Math.random()*LANES);
  const types = ['ammo','shield','boost','rapfire'];
  obs.push({type:'powerup', subtype:types[Math.floor(Math.random()*types.length)], lane, x:laneX(lane), y:-30, vy:150, size:20});
}

function update(dt, t) {
  speed = Math.min(500, 160 + gameTime * 5 + wave * 15);
  gameTime += dt; dist += speed * dt / 10;
  score = Math.floor(dist * 2 + (wave-1) * 200);

  waveT += dt;
  if(waveT > 25 + (wave*2)) { 
    wave++; waveT=0; waveBanner=`WAVE ${wave}`; waveBannerT=2.5; 
    tone(400,'square',0.5);
  }
  if(waveBannerT > 0) waveBannerT -= dt;

  // Input Smoothing
  velX *= Math.pow(0.05, dt); sqX += velX * dt;
  sqX = Math.max(30, Math.min(W-30, sqX));

  if(inv > 0) inv -= dt;
  if(rollCD > 0) rollCD -= dt;
  if(gunCD > 0) gunCD -= dt;
  if(rapid) { rapidT -= dt; if(rapidT <= 0) rapid=false; }

  // Warp Stars
  warpStars.forEach(s => { s.z -= speed * 0.8 * dt; if(s.z <= 1) s.z = W; });

  // Spawn Logic
  spawnT -= dt;
  if(spawnT <= 0) { spawnAlien(); spawnT = Math.max(0.5, 2.0 - wave*0.1); if(Math.random()<0.1) spawnPowerup(); }

  // Enemy AI Processing
  for(let i=obs.length-1; i>=0; i--) {
    const o = obs[i]; o.y += o.vy * dt;
    if(o.weave) o.x = laneX(o.lane) + Math.sin(t*6) * 40;
    if(o.subtype==='phantom') { o.flickerT += dt; o.isGhost = Math.sin(o.flickerT * 12) > 0; }
    if(o.canShoot) { o.shotT -= dt; if(o.shotT <= 0 && o.y < H-200) { missiles.push({x:o.x, y:o.y+20, vy:o.vy+150, size:5, color:o.color}); o.shotT=2.0; } }
    if(o.subtype==='dreadnought' && o.hp <= o.maxHp/2 && !o.rage) { o.rage=true; o.vy *= 1.8; o.color='#ff3300'; }

    if(o.y > H+50) { obs.splice(i,1); continue; }

    // Collision
    const d = Math.hypot(o.x-sqX, o.y-SY);
    if(d < o.size + 15 && inv <= 0) {
      if(o.type==='powerup') {
        if(o.subtype==='shield') inv=4; if(o.subtype==='rapfire') { rapid=true; rapidT=6; } score += 100;
        obs.splice(i,1); tone(800,'sine',0.2);
      } else {
        lives--; inv=2; shake=0.5; tone(100,'sawtooth',0.3); obs.splice(i,1);
        if(lives<=0) gameOver();
      }
    }
  }

  // Missile movement
  for(let i=missiles.length-1; i>=0; i--) {
    const m = missiles[i]; m.y += m.vy * dt;
    if(Math.hypot(m.x-sqX, m.y-SY) < 20 && inv <= 0) { lives--; inv=2; missiles.splice(i,1); if(lives<=0) gameOver(); }
    if(m.y > H) missiles.splice(i,1);
  }

  // Beam movement
  for(let i=beams.length-1; i>=0; i--) {
    const b = beams[i]; b.y -= 800 * dt;
    if(b.y < -20) { beams.splice(i,1); continue; }
    for(let j=obs.length-1; j>=0; j--) {
      const o = obs[j]; if(o.type==='powerup' || o.isGhost) continue;
      if(Math.hypot(b.x-o.x, b.y-o.y) < o.size+10) {
        o.hp--; beams.splice(i,1); tone(600,'sine',0.05);
        if(o.hp <= 0) { score += o.score; obs.splice(j,1); tone(200,'sawtooth',0.1); }
        break;
      }
    }
  }

  // UI
  document.getElementById('sc').textContent = Math.floor(score);
  document.getElementById('dc').textContent = Math.floor(dist) + 'm';
  const wh = document.getElementById('waveHud'); wh.textContent = wave;
  wh.style.color = WAVE_COLORS[Math.min(wave-1, 5)];
}

function draw() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  
  // Stars
  warpStars.forEach(s => {
    const r = (1 - s.z/W) * 3;
    ctx.fillStyle = s.col; ctx.beginPath(); ctx.arc((s.x/s.z)*W+W/2, (s.y/s.z)*H+H/2, r, 0, Math.PI*2); ctx.fill();
  });

  // Beams
  beams.forEach(b => { ctx.fillStyle='#0ff'; ctx.fillRect(b.x-2, b.y, 4, 15); });

  // Enemies
  obs.forEach(o => {
    ctx.save(); ctx.translate(o.x, o.y);
    ctx.globalAlpha = o.isGhost ? 0.3 : 1.0;
    ctx.shadowBlur = 15; ctx.shadowColor = o.color; ctx.fillStyle = o.color;
    if(o.type==='powerup') { ctx.beginPath(); ctx.arc(0,0,o.size,0,Math.PI*2); ctx.fill(); }
    else { ctx.fillRect(-o.size/2, -o.size/2, o.size, o.size); }
    ctx.restore();
  });

  // Missiles
  missiles.forEach(m => { ctx.fillStyle=m.color; ctx.beginPath(); ctx.arc(m.x, m.y, 5, 0, Math.PI*2); ctx.fill(); });

  // Player
  ctx.save(); ctx.translate(sqX, SY);
  if(inv > 0 && Math.floor(gameTime*10)%2===0) ctx.globalAlpha = 0.3;
  ctx.shadowBlur = 20; ctx.shadowColor = '#C9A84C'; ctx.fillStyle='#4a3522';
  ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(-7, -5, 3, 0, Math.PI*2); ctx.arc(7, -5, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Wave Banner
  if(waveBannerT > 0) {
    ctx.font = 'bold 40px "Black Ops One"'; ctx.fillStyle='#FFD700'; ctx.textAlign='center';
    ctx.fillText(waveBanner, W/2, H/2);
  }
}

function shoot() {
  if(gunCD > 0) return;
  beams.push({x:sqX-15, y:SY}, {x:sqX+15, y:SY});
  gunCD = rapid ? 0.08 : 0.25;
  tone(1200, 'sine', 0.05, 0.05);
}

function loop(ts) {
  if(state!=='playing') return;
  const dt = 0.016; update(dt, ts/1000); draw();
  requestAnimationFrame(loop);
}

// Input
canvas.addEventListener('touchstart', e => { txS=e.touches[0].clientX; tmoved=false; });
canvas.addEventListener('touchmove', e => { 
  const dx = e.touches[0].clientX - txS;
  velX += dx * 10; txS = e.touches[0].clientX; tmoved=true;
});
canvas.addEventListener('touchend', () => { if(!tmoved) shoot(); });
window.addEventListener('keydown', e => { 
  if(e.key==='ArrowLeft') velX -= 400; if(e.key==='ArrowRight') velX += 400; if(e.key===' ') shoot();
});

function startGame() {
  state='playing'; score=0; dist=0; gameTime=0; lives=3; obs=[]; missiles=[]; beams=[]; wave=1;
  document.getElementById('ss').style.display='none'; document.getElementById('gs').style.display='none';
  requestAnimationFrame(loop);
}

function gameOver() {
  state='gameover'; document.getElementById('gs').style.display='flex';
  document.getElementById('fs').textContent = Math.floor(score);
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('retryBtn').onclick = startGame;
</script>
</body>
</html>
