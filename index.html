<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SquachAcers: Space Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--gold-bright:#FFD700;--deep:#050510;--red:#ff3333;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;user-select:none;touch-action:none;}
  #gc{position:relative;width:min(500px,100vw);height:min(700px,100vh);overflow:hidden;}
  canvas{width:100%;height:100%;display:block;}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 0;pointer-events:none;z-index:10;}
  .hb{display:flex;flex-direction:column;align-items:center;}
  .hl{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:2px;color:var(--gold);opacity:0.7;}
  .hv{font-family:'Black Ops One',cursive;font-size:22px;color:#fff;text-shadow:0 0 10px var(--gold);}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;padding:24px;text-align:center;}
  #ss{background:radial-gradient(ellipse at center,#0a0015 0%,#000 100%);}
  #gs{background:rgba(0,0,10,0.97);display:none;overflow-y:auto;}
  .logo{font-family:'Black Ops One',cursive;font-size:36px;color:var(--gold-bright);text-shadow:0 0 30px var(--gold);letter-spacing:3px;margin-bottom:4px;}
  .sub{font-family:'Black Ops One',cursive;font-size:13px;color:#aaa;letter-spacing:5px;margin-bottom:18px;}
  .art{font-size:68px;margin:6px 0;animation:fly 2s ease-in-out infinite;}
  @keyframes fly{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-10px) rotate(5deg);}}
  .desc{font-size:12px;color:#777;letter-spacing:1px;margin-bottom:20px;line-height:1.9;}
  .btn{font-family:'Black Ops One',cursive;font-size:15px;letter-spacing:3px;padding:13px 36px;border:2px solid var(--gold);background:transparent;color:var(--gold-bright);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn::before{content:'';position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity 0.2s;}
  .btn:hover::before{opacity:0.15;}
  .btn:active{transform:scale(0.96);}
  .ot{font-family:'Black Ops One',cursive;font-size:40px;color:var(--red);text-shadow:0 0 30px var(--red);margin-bottom:6px;}
  .os{font-size:12px;color:#666;letter-spacing:3px;margin-bottom:14px;}
  .sd{font-family:'Black Ops One',cursive;font-size:48px;color:var(--gold-bright);text-shadow:0 0 20px var(--gold);margin-bottom:2px;}
  .sl{font-size:10px;letter-spacing:4px;color:#555;margin-bottom:14px;}
  .popup{position:absolute;font-family:'Black Ops One',cursive;font-size:16px;color:var(--gold-bright);pointer-events:none;animation:fu 0.9s ease-out forwards;z-index:30;text-shadow:0 0 8px var(--gold);}
  @keyframes fu{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-55px) scale(1.3);}}
  .lb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;margin-bottom:3px;font-family:'Black Ops One',cursive;font-size:12px;letter-spacing:1px;border-left:3px solid transparent;}
  .lb-row.gold{border-color:#FFD700;background:rgba(255,215,0,0.08);}
  .lb-row.silver{border-color:#aaa;background:rgba(200,200,200,0.05);}
  .lb-row.bronze{border-color:#cd7f32;background:rgba(205,127,50,0.05);}
  .lb-row.normal{border-color:#333;background:rgba(255,255,255,0.03);}
  .lb-row.hl2{border-color:#C9A84C;background:rgba(201,168,76,0.12);}
  .lbr{color:#C9A84C;width:22px;}.lbn{color:#fff;flex:1;padding:0 6px;}.lbs{color:#FFD700;}.lbd{color:#555;font-size:9px;margin-left:5px;}
  .lbt{font-family:'Black Ops One',cursive;font-size:9px;letter-spacing:4px;color:#C9A84C;text-align:center;margin-bottom:6px;opacity:0.8;}
  #ne{display:none;flex-direction:column;align-items:center;margin-bottom:12px;}
  #ni{font-family:'Black Ops One',cursive;font-size:16px;letter-spacing:3px;background:rgba(0,0,0,0.6);border:2px solid #C9A84C;color:#FFD700;padding:9px 14px;text-align:center;outline:none;width:210px;text-transform:uppercase;}
  #trees-hud{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:15;pointer-events:none;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="hb"><div class="hl">SCORE</div><div class="hv" id="sc">0</div></div>
    <div class="hb"><div class="hl">WAVE</div><div class="hv" id="waveHud">1</div></div>
    <div class="hb"><div class="hl">DIST</div><div class="hv" id="dc">0m</div></div>
  </div>
  <div id="trees-hud"></div>
  <div class="screen" id="ss" style="justify-content:flex-start;padding-top:26px;overflow-y:auto;">
    <div class="logo">SQUACHACERS</div>
    <div class="sub">SPACE RUNNER</div>
    <div class="art">🦶</div>
    <div class="desc">
      BLAST THROUGH OPEN SPACE<br>
      <span style="color:#C9A84C;">← SWIPE LEFT/RIGHT → DODGE</span><br>
      <span style="color:#00ffff;">↑ SWIPE UP → BARREL ROLL</span><br>
      <span style="color:#FFD700;">TAP → DUAL LASERS · PROTECT YOUR TREES 🌲</span>
    </div>
    <button class="btn" id="startBtn">BLAST OFF</button>
    <div style="font-size:11px;color:#444;letter-spacing:2px;margin-top:10px;">BEST: <span id="hsS">0</span></div>
    <div id="slb" style="width:100%;max-width:320px;margin-top:10px;"></div>
  </div>
  <div class="screen" id="gs">
    <div class="ot">OBLITERATED</div>
    <div class="os">SQUACH DOWN</div>
    <div class="sd" id="fs">0</div>
    <div class="sl">POINTS</div>
    <div style="font-size:11px;color:#444;letter-spacing:2px;margin-bottom:12px;">BEST: <span id="hsG">0</span></div>
    <div id="ne">
      <div style="font-family:'Black Ops One',cursive;font-size:10px;letter-spacing:3px;color:#C9A84C;margin-bottom:8px;">NEW HIGH SCORE — ENTER NAME</div>
      <input id="ni" type="text" maxlength="12" placeholder="YOUR NAME">
      <button class="btn" id="saveBtn" style="margin-top:10px;padding:9px 24px;font-size:12px;">SAVE</button>
    </div>
    <div id="lb" style="width:100%;max-width:320px;margin-bottom:16px;"></div>
    <button class="btn" id="retryBtn">FLY AGAIN</button>
  </div>
</div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import{getDatabase,ref,push,query,orderByChild,limitToLast,onValue}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
  const db=getDatabase(initializeApp({apiKey:"AIzaSyCSBF47ibk5F0TCZ1DvwZb7-0cG1BImDd4",authDomain:"squachacers.firebaseapp.com",databaseURL:"https://squachacers-default-rtdb.firebaseio.com",projectId:"squachacers",storageBucket:"squachacers.firebasestorage.app",messagingSenderId:"305836513755",appId:"1:305836513755:web:2d9a412923e817a6ee2ffe"}));
  window._fbL=cb=>onValue(query(ref(db,'runner_scores'),orderByChild('score'),limitToLast(10)),s=>{const d=s.val();cb(d?Object.values(d).sort((a,b)=>b.score-a.score):[]);});
  window._fbS=(n,s,d)=>push(ref(db,'runner_scores'),{name:n.toUpperCase().trim()||'ACER',score:s,dist:d,date:Date.now()});
  document.dispatchEvent(new Event('fbReady'));
</script>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=500,H=700;
canvas.width=W;canvas.height=H;
const LANES=3,LANE_W=W/LANES,SY=H-150;
function laneX(l){return LANE_W*l+LANE_W/2;}
const GUN_RATE=0.2;
let state='start',score=0,dist=0,hiScore=parseInt(localStorage.getItem('sr2_hs')||'0');
let gameTime=0,speed=0,tLane=1,curLane=1,sqX=laneX(1),velX=0,tunnelZ=0;
let rolling=false,rollA=0,rollDir=0,rollCD=0;
const ROLL_DUR=0.45,ROLL_CD=1.0;
let gunCD=0;
let beams=[],obs=[],parts=[],rings=[];
let spawnT=0,lastT=0,shake=0,inv=0,lives=3,maxLives=3;
let globalScores=[];
let txS=0,tyS=0,tmoved=false,tdir='';
function getBossTier(waveNum){if(waveNum===1)return 5;return waveNum;}
const WAVE_DUR=[15,18,22,26,30,34,38];
let wave=1,waveT=0,waveBanner='',waveBannerT=0;
let isBossWave=false;
let rapid=false,rapidT=0,rapidFireT=0;
const RAPID_DUR=6;
let lastHeart=0;
let segs=[],segZ=0;
let attackers=[],attackSpawnT=2,missiles=[];
let boss=null;
let bossPlaying=false,bossNodes={};
const STAR_COUNT=220;
let warpStars=[];
function initStars(){warpStars=[];for(let i=0;i<STAR_COUNT;i++)warpStars.push(newStar(true));}
function newStar(rz=false){return{x:(Math.random()-0.5)*W*3,y:(Math.random()-0.5)*H*3,z:rz?Math.random()*W:W,r:Math.random()*2.2+0.3,col:Math.random()<0.06?`hsl(${Math.random()*60+180},80%,80%)`:'#fff'};}
initStars();
function updateTreesHud(){const hud=document.getElementById('trees-hud');if(!hud)return;hud.innerHTML='';for(let i=0;i<maxLives;i++){const span=document.createElement('span');span.style.cssText=`font-size:28px;opacity:${i<lives?'1':'0.2'};filter:${i<lives?'drop-shadow(0 0 6px #44ff44)':'grayscale(1)'};transition:all 0.3s;`;span.textContent='🌲';hud.appendChild(span);}}
let AC=null,mN={},mPlay=false,muteBtn;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,tp,dur,vol=0.22,delay=0){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=tp;o.frequency.setValueAtTime(f,ac.currentTime+delay);g.gain.setValueAtTime(0,ac.currentTime+delay);g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+0.05);}catch(e){}}
function noise(dur,vol,lpf=400){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=lpf;s.buffer=buf;s.connect(f);f.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(vol,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);s.start();s.stop(ac.currentTime+dur+0.05);}catch(e){}}
function sfxShoot(){tone(700,'sawtooth',0.04,0.18);tone(1100,'sine',0.03,0.1,0.02);}
function sfxHit(){noise(0.12,0.45,600);}
function sfxExplode(){noise(0.28,0.6,200);}
function sfxDie(){[350,250,160,80].forEach((f,i)=>tone(f,'sawtooth',0.35,0.4,i*0.18));}
function sfxPickup(){[700,900,1100].forEach((f,i)=>tone(f,'sine',0.1,0.22,i*0.06));}
function sfxLane(){tone(350,'sine',0.05,0.1);}
function sfxRoll(){tone(500,'sawtooth',0.04,0.1);tone(750,'sine',0.07,0.15,0.04);}
function sfxHeart(){[500,650,850].forEach((f,i)=>tone(f,'sine',0.18,0.3,i*0.07));}
function sfxWave(){[200,300,420,540].forEach((f,i)=>tone(f,'square',0.18,0.22,i*0.06));}
function startMusic(){
  if(mPlay)return;const ac=getAC();mPlay=true;
  const mg=ac.createGain();mg.gain.value=0.11;mg.connect(ac.destination);mN.m=mg;
  const step=60/148/4;
  const bass=[41,41,55,41,49,41,55,49];let bs=0,bt=ac.currentTime+0.1;
  function sBass(){if(!mPlay)return;while(bt<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=320;o.type='sawtooth';o.frequency.value=bass[bs%8];o.connect(f);f.connect(g);g.connect(mg);g.gain.setValueAtTime(0,bt);g.gain.linearRampToValueAtTime(0.8,bt+0.01);g.gain.exponentialRampToValueAtTime(0.001,bt+step*1.8);o.start(bt);o.stop(bt+step*2.2);bs++;bt+=step*2;}mN.bT=setTimeout(sBass,150);}
  const arp=[311,392,466,554,466,392,311,261,294,370,440,523,440,370,294,247];let as=0,at=ac.currentTime+0.1;
  function sArp(){if(!mPlay)return;while(at<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=arp[as%16];o.connect(g);g.connect(mg);g.gain.setValueAtTime(0,at);g.gain.linearRampToValueAtTime(0.14,at+0.005);g.gain.exponentialRampToValueAtTime(0.001,at+step*0.7);o.start(at);o.stop(at+step);as++;at+=step;}mN.aT=setTimeout(sArp,150);}
  let kt=ac.currentTime+0.1;
  function sKick(){if(!mPlay)return;while(kt<ac.currentTime+0.4){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(160,kt);o.frequency.exponentialRampToValueAtTime(38,kt+0.09);o.connect(g);g.connect(mg);g.gain.setValueAtTime(1.4,kt);g.gain.exponentialRampToValueAtTime(0.001,kt+0.24);o.start(kt);o.stop(kt+0.3);kt+=step*8;}mN.kT=setTimeout(sKick,150);}
  let ht=ac.currentTime+0.1;
  function sHat(){if(!mPlay)return;while(ht<ac.currentTime+0.4){const buf=ac.createBuffer(1,ac.sampleRate*0.025,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=10000;s.buffer=buf;s.connect(f);f.connect(g);g.connect(mg);g.gain.setValueAtTime(0.22,ht);g.gain.exponentialRampToValueAtTime(0.001,ht+0.025);s.start(ht);s.stop(ht+0.03);ht+=step*2;}mN.hT=setTimeout(sHat,150);}
  sBass();sArp();sKick();sHat();
}
function stopMusic(){mPlay=false;['bT','aT','kT','hT'].forEach(k=>clearTimeout(mN[k]));if(mN.m)try{mN.m.gain.linearRampToValueAtTime(0,AC.currentTime+0.2);}catch(e){}mN={};}
function startBossMusic(){
  if(bossPlaying)return;
  stopMusic();
  const ac=getAC();bossPlaying=true;
  const mg=ac.createGain();mg.gain.value=0;mg.connect(ac.destination);
  mg.gain.linearRampToValueAtTime(0.18,ac.currentTime+0.6);
  bossNodes.m=mg;
  const step=60/90/4;
  const bossLine=[29,28,27,26,25,24,23,22];let bi=0,bt=ac.currentTime+0.1;
  function sBossB(){if(!bossPlaying)return;while(bt<ac.currentTime+0.5){const o=ac.createOscillator(),g=ac.createGain(),dist=ac.createWaveShaper();const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}dist.curve=curve;const filt=ac.createBiquadFilter();filt.type='lowpass';filt.frequency.value=180;o.type='sawtooth';o.frequency.value=bossLine[bi%8];o.connect(dist);dist.connect(filt);filt.connect(g);g.connect(mg);g.gain.setValueAtTime(0,bt);g.gain.linearRampToValueAtTime(1.6,bt+0.02);g.gain.exponentialRampToValueAtTime(0.001,bt+step*3.5);o.start(bt);o.stop(bt+step*4);bi++;bt+=step*4;}bossNodes.bT=setTimeout(sBossB,200);}
  const stabs=[[185,247,370],[175,233,349],[165,220,329],[155,207,311]];let si=0,st=ac.currentTime+0.05;
  function sBossStab(){if(!bossPlaying)return;while(st<ac.currentTime+0.5){stabs[si%4].forEach(freq=>{const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=freq;o.connect(g);g.connect(mg);g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.09,st+0.008);g.gain.exponentialRampToValueAtTime(0.001,st+step*3);o.start(st);o.stop(st+step*4);});si++;st+=step*8;}bossNodes.sT=setTimeout(sBossStab,200);}
  let kt=ac.currentTime+0.1;
  function sBossKick(){if(!bossPlaying)return;while(kt<ac.currentTime+0.5){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(90,kt);o.frequency.exponentialRampToValueAtTime(28,kt+0.12);o.connect(g);g.connect(mg);g.gain.setValueAtTime(0,kt);g.gain.linearRampToValueAtTime(2.2,kt+0.005);g.gain.exponentialRampToValueAtTime(0.001,kt+0.35);o.start(kt);o.stop(kt+0.4);kt+=step*8;}bossNodes.kT=setTimeout(sBossKick,200);}
  let nt=ac.currentTime+step*16+0.1;
  function sBossSnare(){if(!bossPlaying)return;while(nt<ac.currentTime+0.5){noise(0.08,0.55,3500);const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.setValueAtTime(200,nt);o.frequency.exponentialRampToValueAtTime(80,nt+0.06);o.connect(g);g.connect(mg);g.gain.setValueAtTime(0.6,nt);g.gain.exponentialRampToValueAtTime(0.001,nt+0.1);o.start(nt);o.stop(nt+0.12);nt+=step*16;}bossNodes.nT=setTimeout(sBossSnare,200);}
  let wt=ac.currentTime+0.2;
  function sBossSiren(){if(!bossPlaying)return;while(wt<ac.currentTime+0.5){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(880,wt);o.frequency.linearRampToValueAtTime(440,wt+step*16);o.connect(g);g.connect(mg);g.gain.setValueAtTime(0,wt);g.gain.linearRampToValueAtTime(0.03,wt+0.05);g.gain.setValueAtTime(0.03,wt+step*15);g.gain.exponentialRampToValueAtTime(0.001,wt+step*16);o.start(wt);o.stop(wt+step*16+0.1);wt+=step*32;}bossNodes.wT=setTimeout(sBossSiren,200);}
  sBossB();sBossStab();sBossKick();sBossSnare();sBossSiren();
}
function stopBossMusic(){bossPlaying=false;['bT','sT','kT','nT','wT'].forEach(k=>clearTimeout(bossNodes[k]));if(bossNodes.m)try{bossNodes.m.gain.linearRampToValueAtTime(0,AC.currentTime+0.3);}catch(e){}bossNodes={};}
function toggleMute(){if(mPlay||bossPlaying){stopMusic();stopBossMusic();if(muteBtn)muteBtn.textContent='🔇';}else{if(isBossWave||boss)startBossMusic();else startMusic();if(muteBtn)muteBtn.textContent='🔊';}}
function getLocal(){try{return JSON.parse(localStorage.getItem('sr2_sc')||'[]');}catch(e){return[];}}
function saveLocal(s){localStorage.setItem('sr2_sc',JSON.stringify(s));}
function isHigh(s){const sc=globalScores.length?globalScores:getLocal();return sc.length<10||s>(sc[sc.length-1]?.score||0);}
function renderLB(id,hl=null){const sc=globalScores.length?globalScores:getLocal();const el=document.getElementById(id);if(!el)return;if(!sc.length){el.innerHTML='<div class="lbt" style="color:#333;">NO SCORES YET — BE FIRST</div>';return;}const m=['gold','silver','bronze'];el.innerHTML='<div class="lbt">🌍 HALL OF ACERS</div>'+sc.map((s,i)=>`<div class="lb-row ${m[i]||(s.score===hl?'hl2':'normal')}"><span class="lbr">${i===0?'👑':'#'+(i+1)}</span><span class="lbn">${s.name}</span><span class="lbs">${s.score.toLocaleString()}</span><span class="lbd">${s.dist||0}m</span></div>`).join('');}
document.addEventListener('fbReady',()=>{if(window._fbL)window._fbL(s=>{globalScores=s;renderLB('lb');renderLB('slb');});});
function genSeg(z){const hardness=Math.min(0.9,wave*0.08);const open=Math.floor(Math.random()*LANES);const block=[];for(let l=0;l<LANES;l++){if(l!==open&&Math.random()<hardness*0.7)block.push(l);}return{z,blocked:block,powerup:Math.random()<0.1?open:null,pwType:['ammo','shield','boost','rapfire'][Math.floor(Math.random()*4)],_spawned:false};}
function ensureSegs(spacing=160){while(segZ<tunnelZ+H*4){segs.push(genSeg(segZ));segZ+=spacing;}segs=segs.filter(s=>s.z>tunnelZ-spacing*2);}
function processSegs(){if(isBossWave)return;for(const seg of segs){if(seg._spawned)continue;const rel=seg.z-tunnelZ;if(rel>0&&rel<600){seg._spawned=true;const baseSpd=180+wave*18;for(const bl of seg.blocked){const sz=24+Math.min(wave*1.5,18);obs.push({type:'block',lane:bl,x:laneX(bl),y:-sz-20,vy:baseSpd*(0.85+Math.random()*0.3),size:sz,hp:1,maxHp:1,score:10,wobble:0,color:'#ff3300'});}if(seg.powerup!=null)obs.push({type:'powerup',subtype:seg.pwType,lane:seg.powerup,x:laneX(seg.powerup),y:-30,vy:(180+wave*18)*0.55,size:20,wobble:Math.random()*Math.PI*2,hp:1,maxHp:1,score:0});}}}
function spawnAlien(){if(isBossWave)return;const lane=Math.floor(Math.random()*LANES),baseSpd=170+wave*15,roll=Math.random();if(roll<0.3)obs.push({type:'alien',subtype:'interceptor',lane,x:laneX(lane),y:-30,vy:baseSpd*1.6,size:15,hp:1,maxHp:1,wobble:Math.random()*Math.PI*2,color:'#ff2288',score:80});else if(roll<0.6)obs.push({type:'alien',subtype:'cruiser',lane,x:laneX(lane),y:-44,vy:baseSpd,size:28,hp:1,maxHp:1,wobble:Math.random()*Math.PI*2,color:'#44ff88',score:50});else if(roll<0.78)obs.push({type:'alien',subtype:'dreadnought',lane,x:laneX(lane),y:-55,vy:baseSpd*0.55,size:38,hp:2+Math.floor(wave/2),maxHp:2+Math.floor(wave/2),wobble:Math.random()*Math.PI*2,color:'#ff8800',score:120+wave*15,big:true});else obs.push({type:'alien',subtype:'phantom',lane,x:laneX(lane),y:-38,vy:baseSpd*1.1,size:24,hp:2,maxHp:2,wobble:Math.random()*Math.PI*2,color:'#cc44ff',score:100});}
function popup(x,y,val){const el=document.createElement('div');el.className='popup';el.textContent=typeof val==='number'?'+'+val:val;const rc=canvas.getBoundingClientRect();el.style.left=(rc.left+x*(rc.width/W))+'px';el.style.top=(rc.top+y*(rc.height/H))+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),900);}
function spawnParts(x,y,color,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=50+Math.random()*140;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.6+Math.random()*0.9,size:2+Math.random()*4,color});}}
function spawnRing(x,y,color){rings.push({x,y,r:5,maxR:60,life:1,color});}
function spawnAttacker(){if(isBossWave)return;const fromLeft=Math.random()<0.5;const cols=['#ff44aa','#ff8800','#00ffee','#cc44ff','#ffdd00'];const col=cols[Math.floor(Math.random()*cols.length)];const hp=wave>=4?2:1;const startX=fromLeft?-40:W+40,startY=40+Math.random()*60;attackers.push({x:startX,y:startY,startX,startY,fromLeft,phase:'enter',t:0,loopCount:0,maxLoops:wave<=2?1:1+Math.floor(Math.random()*2),cx:W*0.2+Math.random()*W*0.6,cy:70+Math.random()*80,aimX:W/2,hp,maxHp:hp,size:12+Math.floor(wave/3)*2,color:col,score:150+wave*20,angle:0,trail:[],_firedMid:false});}
function updateAttackers(dt){
  if(!boss&&!isBossWave){attackSpawnT-=dt;if(attackSpawnT<=0){if(Math.random()<0.8)spawnAttacker();attackSpawnT=Math.max(1.0,5.5-wave*0.45)*(0.6+Math.random()*0.7);}}
  for(let i=attackers.length-1;i>=0;i--){const a=attackers[i];a.t+=dt;const prevX=a.x,prevY=a.y;if(a.phase==='enter'){const dur=0.9,p=Math.min(1,a.t/dur);const ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;const cpX=a.fromLeft?a.cx*0.3:W-a.cx*0.3,cpY=a.cy-80;a.x=Math.pow(1-ease,2)*a.startX+2*(1-ease)*ease*cpX+ease*ease*a.cx;a.y=Math.pow(1-ease,2)*a.startY+2*(1-ease)*ease*cpY+ease*ease*a.cy;if(a.t>=dur){a.phase='loop';a.t=0;}}else if(a.phase==='loop'){const A=70+wave*4,B=35+wave*2,spd=1.8+wave*0.1,lt=a.t*spd;const denom=1+Math.pow(Math.sin(lt),2);a.x=a.cx+A*Math.cos(lt)/denom;a.y=a.cy+B*Math.sin(lt)*Math.cos(lt)/denom;if(a.t*spd>=Math.PI*2*a.maxLoops){a.phase='aim';a.t=0;a.aimX=sqX;}}else if(a.phase==='aim'){a.x+=(sqX-a.x)*dt*1.5;a.y+=Math.sin(a.t*12)*0.5;if(a.t>=0.5){a.phase='dive';a.t=0;missiles.push({x:a.x,y:a.y+a.size,vx:(sqX-a.x)*0.8,vy:420+wave*18,life:1,color:a.color,size:5});}}else if(a.phase==='dive'){a.y+=(380+wave*20)*dt;a.x+=(a.aimX-a.x)*dt*3;if(a.t>0.25&&!a._firedMid){a._firedMid=true;missiles.push({x:a.x,y:a.y+a.size,vx:(sqX-a.x)*0.5,vy:380+wave*15,life:1,color:a.color,size:5});}if(a.y>H+60){attackers.splice(i,1);continue;}}
  const dx=a.x-prevX,dy=a.y-prevY;if(Math.abs(dx)+Math.abs(dy)>0.1)a.angle=Math.atan2(dy,dx)+Math.PI/2;a.trail.push({x:a.x,y:a.y});if(a.trail.length>10)a.trail.shift();let dead=false;for(let j=beams.length-1;j>=0;j--){if(Math.hypot(beams[j].x-a.x,beams[j].y-a.y)<a.size+6){a.hp--;sfxHit();spawnParts(beams[j].x,beams[j].y,a.color,6);beams.splice(j,1);if(a.hp<=0){sfxExplode();spawnParts(a.x,a.y,a.color,22);spawnRing(a.x,a.y,a.color);score+=a.score;popup(a.x,a.y,a.score);attackers.splice(i,1);dead=true;}break;}}if(dead)continue;if(inv<=0&&Math.hypot(a.x-sqX,a.y-SY)<a.size+10){lives--;inv=1.5;shake=1.0;sfxHit();spawnParts(sqX,SY,'#ff3333',20);spawnRing(sqX,SY,'#ff3333');attackers.splice(i,1);updateTreesHud();if(lives<=0){gameOver();return;}}}
  for(let i=missiles.length-1;i>=0;i--){const m=missiles[i];m.x+=m.vx*dt;m.y+=m.vy*dt;m.life-=dt*0.4;if(m.y>H+20||m.life<=0){missiles.splice(i,1);continue;}if(inv<=0&&Math.hypot(m.x-sqX,m.y-SY)<m.size+12){lives--;inv=1.5;shake=0.9;sfxHit();spawnParts(sqX,SY,'#ff3333',16);spawnRing(sqX,SY,'#ff3333');missiles.splice(i,1);updateTreesHud();if(lives<=0){gameOver();return;}}}
}
function triggerBossWave(){
  if(state!=='playing')return;isBossWave=true;obs=obs.filter(o=>o.type==='powerup');attackers=[];missiles=[];
  const bossTier=getBossTier(wave);const isGigaBoss=(wave===1);
  waveBanner=isGigaBoss?`☠ TIER ${bossTier} BOSS — WAVE ${wave} ☠`:`⚠ BOSS ${bossTier} INCOMING ⚠`;waveBannerT=3;
  sfxWave();setTimeout(sfxWave,300);setTimeout(sfxWave,600);
  stopMusic();setTimeout(()=>{if(state==='playing')startBossMusic();},400);
  setTimeout(()=>{if(state==='playing')spawnBoss(bossTier);},2800);
}
function spawnBoss(tier){if(state!=='playing')return;const hp=20+tier*12;boss={x:W/2,y:-130,hp,maxHp:hp,phase:'enter',t:0,angle:0,trail:[],sideDir:1,missileT:0,tier,score:2000+tier*800,size:52+tier*6,_diveFired:false};}
function updateBoss(dt){
  if(!boss)return;const b=boss;b.t+=dt;
  if(b.phase==='enter'){const ty=110;b.y+=(ty-b.y)*dt*3;b.x+=(W/2-b.x)*dt*2;if(Math.abs(b.y-ty)<6&&b.t>1.0){b.phase='hover';b.t=0;}}
  else if(b.phase==='hover'){b.x+=Math.sin(b.t*1.1)*1.4;b.y=110+Math.sin(b.t*0.7)*14;b.missileT-=dt;if(b.missileT<=0){[-0.4,0,0.4].forEach(off=>missiles.push({x:b.x+off*b.size,y:b.y+b.size*0.5,vx:(sqX-b.x)*0.4+off*130,vy:290+wave*10,life:1,color:'#ff0044',size:7}));b.missileT=Math.max(0.6,1.5-b.tier*0.08);}if(b.t>4.5){b.phase='sweep';b.t=0;b.sideDir=Math.random()<0.5?1:-1;}}
  else if(b.phase==='sweep'){const spd=200+b.tier*22;b.x+=b.sideDir*spd*dt;b.y=100+Math.sin(b.t*3)*28;b.missileT-=dt;if(b.missileT<=0){missiles.push({x:b.x,y:b.y+b.size*0.5,vx:(sqX-b.x)*0.7,vy:310+wave*12,life:1,color:'#ff8800',size:6});b.missileT=0.2;}if(b.x<b.size){b.x=b.size;b.sideDir=1;}if(b.x>W-b.size){b.x=W-b.size;b.sideDir=-1;}if(b.t>3.5){b.phase='dive';b.t=0;b._diveFired=false;}}
  else if(b.phase==='dive'){if(b.t<0.25)b.x+=(sqX-b.x)*dt*6;else b.y+=520*dt;if(b.t>0.35&&!b._diveFired){b._diveFired=true;for(let a=-0.6;a<=0.6;a+=0.3)missiles.push({x:b.x,y:b.y,vx:Math.sin(a)*200,vy:Math.cos(a)*370,life:1,color:'#ff0044',size:8});}if(b.y>H+160){b.y=-160;b.phase='enter';b.t=0;b._diveFired=false;}}
  b.trail.push({x:b.x,y:b.y});if(b.trail.length>18)b.trail.shift();if(b.trail.length>1){const p=b.trail[b.trail.length-2],dx=b.x-p.x,dy=b.y-p.y;if(Math.abs(dx)+Math.abs(dy)>0.1)b.angle=Math.atan2(dy,dx)+Math.PI/2;}
  for(let j=beams.length-1;j>=0;j--){if(Math.hypot(beams[j].x-b.x,beams[j].y-b.y)<b.size+8){b.hp--;sfxHit();spawnParts(beams[j].x,beams[j].y,'#ff4400',5);beams.splice(j,1);if(b.hp<=0){sfxExplode();sfxExplode();for(let k=0;k<5;k++)setTimeout(()=>{if(state==='playing'){spawnParts(b.x+(Math.random()-0.5)*100,b.y+(Math.random()-0.5)*100,'#ff8800',28);spawnRing(b.x+(Math.random()-0.5)*60,b.y+(Math.random()-0.5)*60,'#ff8800');}},k*130);score+=b.score;popup(W/2,H/2-80,b.score);['shield','boost','rapfire'].forEach((pw,i)=>obs.push({type:'powerup',subtype:pw,lane:i,x:laneX(i),y:Math.max(0,b.y+80),vy:110,size:22,wobble:0,hp:1,maxHp:1,score:0}));boss=null;isBossWave=false;stopBossMusic();setTimeout(()=>{if(state==='playing'&&!isBossWave)startMusic();},400);wave++;waveBanner=`👑 BOSS SLAIN! WAVE ${wave}`;waveBannerT=3.5;attackSpawnT=3;return;}break;}}

function drawBg(t){ctx.fillStyle='#000005';ctx.fillRect(0,0,W,H);const cx=W/2,cy=H*0.45,ws=speed*0.9;for(const s of warpStars){const sx=(s.x/s.z)*W+cx,sy=(s.y/s.z)*H*0.7+cy;if(sx<-20||sx>W+20||sy<-20||sy>H+20||s.z<=0){Object.assign(s,newStar(false));continue;}const psz=Math.min(s.z+ws*0.016,W);const px=(s.x/psz)*W+cx,py=(s.y/psz)*H*0.7+cy;const br=Math.max(0,1-s.z/W),sz=Math.max(0.4,(1-s.z/W)*2.5);ctx.globalAlpha=br*0.9;if(br>0.3){ctx.strokeStyle=s.col;ctx.lineWidth=sz;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();}else{ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,Math.max(0.3,sz*0.5),0,Math.PI*2);ctx.fill();}}ctx.shadowBlur=0;ctx.globalAlpha=1;}

function drawSpace(t){const cx=W/2,cy=H*0.45;const v=ctx.createRadialGradient(cx,cy,H*0.1,cx,cy,H*0.75);v.addColorStop(0,'rgba(0,0,10,0)');v.addColorStop(1,'rgba(0,0,15,0.7)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);const hue=isBossWave?0:170+wave*18;const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,H*0.5);hg.addColorStop(0,`hsla(${hue},100%,60%,${isBossWave?0.08:0.04})`);hg.addColorStop(1,'transparent');ctx.fillStyle=hg;ctx.fillRect(0,0,W,H);}

function update(dt,t){
  if(isNaN(dt)||dt>0.1)dt=0.016;
  speed=Math.min(450,160+gameTime*4+wave*12);gameTime+=dt;dist+=speed*dt/10;
  score=Math.floor(dist*2+wave*50);tunnelZ+=(180+wave*18)*dt;
  if(!isBossWave){const wdur=WAVE_DUR[Math.min(wave-1,WAVE_DUR.length-1)];waveT+=dt;if(waveT>=wdur){waveT=0;triggerBossWave();}}
  if(waveBannerT>0)waveBannerT-=dt;
  if(dist-lastHeart>=800&&lives<maxLives){lives=Math.min(maxLives,lives+1);lastHeart=Math.floor(dist/800)*800;popup(sqX,SY-50,'🌲 TREE SAVED!');sfxHeart();spawnParts(sqX,SY,'#44ff44',18);updateTreesHud();}
  if(gunCD>0)gunCD-=dt;
  if(rapid){rapidT-=dt;if(rapidT<=0){rapid=false;rapidT=0;}rapidFireT-=dt;if(rapidFireT<=0){rapidFireT=0.04;shoot();}}
  updateWarpStars(dt);
  velX*=Math.pow(0.055,dt);sqX+=velX*dt;
  if(sqX<22){sqX=22;velX=Math.abs(velX)*0.25;}if(sqX>W-22){sqX=W-22;velX=-Math.abs(velX)*0.25;}
  curLane=Math.max(0,Math.min(LANES-1,Math.round((sqX-LANE_W/2)/LANE_W)));
  if(rolling){rollA+=dt*(Math.PI*2/ROLL_DUR);if(rollA>=Math.PI*2){rolling=false;rollA=0;rollCD=ROLL_CD;}}
  if(rollCD>0)rollCD-=dt;if(inv>0)inv-=dt;if(shake>0)shake-=dt*5;
  const segSpacing=Math.max(120,280-wave*15);ensureSegs(segSpacing);processSegs();
  spawnT-=dt;if(spawnT<=0){if(Math.random()<0.55)spawnAlien();spawnT=Math.max(0.7,2.2-wave*0.1)*(0.6+Math.random()*0.8);}
  for(let i=obs.length-1;i>=0;i--){const o=obs[i];o.y+=o.vy*dt;if(o.wobble!==undefined)o.wobble+=dt;if(o.y>H+80){obs.splice(i,1);continue;}if(inv<=0){const hitR=o.type==='powerup'?o.size+18:o.size+8;if(Math.hypot(o.x-sqX,o.y-SY)<hitR){if(o.type==='powerup'){const sub=o.subtype;if(sub==='ammo'){score+=150;sfxPickup();spawnParts(o.x,o.y,'#FFD700',14);popup(o.x,o.y,150);}else if(sub==='shield'){inv=Math.max(inv,3);sfxPickup();spawnParts(o.x,o.y,'#00ffff',14);popup(o.x,o.y,'SHIELD!');}else if(sub==='boost'){score+=300;sfxPickup();spawnParts(o.x,o.y,'#00ff88',14);popup(o.x,o.y,300);}else if(sub==='rapfire'){rapid=true;rapidT=RAPID_DUR;rapidFireT=0;gunCD=0;sfxPickup();spawnParts(o.x,o.y,'#ff5500',18);popup(o.x,o.y,'MACHINE GUN!');}obs.splice(i,1);}else{lives--;inv=1.5;shake=0.9;sfxHit();spawnParts(sqX,SY,'#ff3333',20);spawnRing(sqX,SY,'#ff3333');obs.splice(i,1);updateTreesHud();if(lives<=0){gameOver();return;}}}}}
  for(let i=beams.length-1;i>=0;i--){const b=beams[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.age+=dt;if(b.y<-50||b.x<-20||b.x>W+20){beams.splice(i,1);continue;}let hit=false;for(let j=obs.length-1;j>=0;j--){const o=obs[j];if(o.type==='powerup')continue;if(Math.hypot(b.x-o.x,b.y-o.y)<o.size+5){o.hp--;sfxHit();spawnParts(b.x,b.y,o.color||'#ff6600',7);if(o.hp<=0){sfxExplode();spawnParts(o.x,o.y,o.color||'#ff6600',20);spawnRing(o.x,o.y,o.color||'#ff6600');score+=o.score;popup(o.x,o.y,o.score);obs.splice(j,1);}beams.splice(i,1);hit=true;break;}}if(hit)continue;}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=55*dt;p.life-=p.decay*dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.r+=150*dt;r.life-=dt*2.8;if(r.life<=0)rings.splice(i,1);}
  updateAttackers(dt);updateBoss(dt);
  document.getElementById('sc').textContent=Math.floor(score);document.getElementById('dc').textContent=Math.floor(dist)+'m';

}

  score=0;dist=0;gameTime=0;speed=160;lives=3;maxLives=3;tLane=1;curLane=1;sqX=laneX(1);velX=0;
  rolling=false;rollA=0;rollCD=0;tunnelZ=0;gunCD=0;
  beams=[];obs=[];parts=[];rings=[];attackers=[];missiles=[];spawnT=0;inv=0;shake=0;
  boss=null;isBossWave=false;attackSpawnT=2;wave=1;waveT=0;waveBanner='WAVE 1';waveBannerT=2.2;
  rapid=false;rapidT=0;rapidFireT=0;lastHeart=0;segs=[];segZ=0;ensureSegs();initStars();
  stopBossMusic();updateTreesHud();
  document.getElementById('ss').style.display='none';document.getElementById('gs').style.display='none';
  state='playing';startMusic();lastT=performance.now();requestAnimationFrame(loop);
}
function gameOver(){state='gameover';stopMusic();stopBossMusic();sfxDie();if(score>hiScore){hiScore=score;localStorage.setItem('sr2_hs',hiScore);}document.getElementById('fs').textContent=Math.floor(score).toLocaleString();document.getElementById('hsG').textContent=Math.floor(hiScore).toLocaleString();document.getElementById('gs').style.display='flex';const ne=document.getElementById('ne'),ni=document.getElementById('ni');if(isHigh(score)&&score>0){ne.style.display='flex';ni.value='';setTimeout(()=>ni.focus(),300);renderLB('lb',null);}else{ne.style.display='none';renderLB('lb',score);}}
function submitScore(){const name=document.getElementById('ni').value.trim()||'ACER';if(window._fbS)window._fbS(name,Math.floor(score),Math.floor(dist));const local=getLocal();local.push({name:name.toUpperCase(),score:Math.floor(score),dist:Math.floor(dist),date:Date.now()});local.sort((a,b)=>b.score-a.score);saveLocal(local.slice(0,10));document.getElementById('ne').style.display='none';renderLB('lb',score);}
function loop(ts){if(state!=='playing')return;const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;const t=ts/1000;update(dt,t);ctx.save();if(shake>0){const sh=shake*8;ctx.translate((Math.random()-0.5)*sh,(Math.random()-0.5)*sh);}drawBg(t);drawSpace(t);rings.forEach(drawRing);obs.forEach(o=>drawObs(o,t));attackers.forEach(a=>drawAttacker(a,t));missiles.forEach(m=>drawMissile(m,t));if(boss)drawBoss(t);beams.forEach(drawBeam);parts.forEach(drawPart);drawSquach(t);drawSpeedBar();ctx.restore();requestAnimationFrame(loop);}
(function tl(ts){if(state!=='start')return;updateWarpStars(0.016);ctx.save();drawBg(ts/1000);drawSpace(ts/1000);ctx.restore();requestAnimationFrame(tl);})(0);
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('saveBtn').onclick=submitScore;
document.getElementById('ni').addEventListener('keydown',e=>{if(e.key==='Enter')submitScore();});
renderLB('slb');document.getElementById('hsS').textContent=Math.floor(hiScore);
muteBtn=document.createElement('button');muteBtn.textContent='🔊';
muteBtn.style.cssText='position:absolute;top:10px;right:10px;z-index:50;background:rgba(0,0,0,0.6);border:1px solid #C9A84C;color:#FFD700;font-size:15px;padding:3px 8px;cursor:pointer;border-radius:4px;';
muteBtn.onclick=toggleMute;document.getElementById('gc').appendChild(muteBtn);
</script>
