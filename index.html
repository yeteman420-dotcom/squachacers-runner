<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SquachAcers: Kinetic Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;900&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A84C;--cyan:#00ffff;--red:#ff4444;--deep:#050510;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;font-family:'Exo 2',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;}
  #gc{position:relative;width:min(500px,100vw);height:min(700px,100vh);background:var(--deep);overflow:hidden;border:2px solid #222;}
  canvas{width:100%;height:100%;display:block;}
  
  /* UI Overlay */
  .ui-layer{position:absolute;inset:0;pointer-events:none;z-index:10;padding:20px;display:flex;flex-direction:column;justify-content:space-between;}
  .stats-top{display:flex;justify-content:space-between;font-family:'Black Ops One';}
  .stat-box{text-align:center;}
  .stat-label{font-size:10px;color:var(--gold);letter-spacing:2px;}
  .stat-value{font-size:24px;color:#fff;text-shadow:0 0 10px var(--gold);}

  /* Screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,16,0.9);z-index:20;text-align:center;padding:20px;pointer-events:all;}
  .logo{font-family:'Black Ops One';font-size:40px;color:var(--gold);margin-bottom:10px;text-shadow:0 0 20px var(--gold);}
  .btn{font-family:'Black Ops One';padding:15px 40px;font-size:20px;background:transparent;border:2px solid var(--gold);color:var(--gold);cursor:pointer;transition:0.2s;}
  .btn:hover{background:var(--gold);color:#000;}
  
  #ammo-bar{display:flex;gap:5px;margin-top:5px;}
  .pip{width:15px;height:6px;background:var(--gold);box-shadow:0 0 5px var(--gold);transition:0.3s;}
  .pip.empty{opacity:0.2;transform:scale(0.8);}
</style>
</head>
<body>

<div id="gc">
  <canvas id="c"></canvas>
  
  <div class="ui-layer">
    <div class="stats-top">
      <div class="stat-box"><div class="stat-label">SCORE</div><div class="stat-value" id="score-val">0</div></div>
      <div class="stat-box">
        <div class="stat-label">ENERGY</div>
        <div id="ammo-bar"></div>
      </div>
      <div class="stat-box"><div class="stat-label">DIST</div><div class="stat-value" id="dist-val">0m</div></div>
    </div>
  </div>

  <div id="start-screen" class="screen">
    <div class="logo">SQUACHACERS</div>
    <p style="color:#aaa;margin-bottom:30px;letter-spacing:2px;">KINETIC SPACE SLINGSHOT</p>
    <button class="btn" onclick="startGame()">LAUNCH</button>
  </div>

  <div id="over-screen" class="screen" style="display:none;">
    <div class="logo" style="color:var(--red);">CRASHED</div>
    <div class="stat-value" id="final-score" style="font-size:40px;margin-bottom:20px;">0</div>
    <button class="btn" onclick="startGame()">REBOOT</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 700;
canvas.width = W; canvas.height = H;

// --- CONFIG ---
const LANES = 3;
const LANE_W = W / LANES;
const SPRING = 160;   // Tension
const DAMP = 15;      // Friction
const PUNCH = 900;    // Swipe Impulse

// --- STATE ---
let state = 'menu';
let score = 0, dist = 0, speed = 150;
let targetLane = 1;
let curX = W/2, velX = 0; // Physics position
let ammo = 5, stones = [], obs = [];
let lastT = 0, spawnT = 0;

// --- INPUT ---
let touchX = 0, touchY = 0;

window.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});

window.addEventListener('touchend', e => {
  if(state !== 'play') return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;

  if(Math.abs(dx) > 30) {
    // Slingshot Movement
    if(dx > 0 && targetLane < 2) { targetLane++; velX += PUNCH; }
    else if(dx < 0 && targetLane > 0) { targetLane--; velX -= PUNCH; }
  } else if (dy > -20 && dy < 20) {
    // Tap to Shoot
    fire();
  }
});

// Arrow keys for desktop testing
window.addEventListener('keydown', e => {
  if(state !== 'play') return;
  if(e.key === 'ArrowLeft' && targetLane > 0) { targetLane--; velX -= PUNCH; }
  if(e.key === 'ArrowRight' && targetLane < 2) { targetLane++; velX += PUNCH; }
  if(e.key === ' ') fire();
});

function fire() {
  if(ammo <= 0) return;
  ammo--;
  stones.push({x: curX, y: H-120, v: -800});
  updateAmmoUI();
}

function updateAmmoUI() {
  const bar = document.getElementById('ammo-bar');
  bar.innerHTML = '';
  for(let i=0; i<5; i++) {
    const p = document.createElement('div');
    p.className = 'pip' + (i < ammo ? '' : ' empty');
    bar.appendChild(p);
  }
}

function startGame() {
  score = 0; dist = 0; speed = 180;
  targetLane = 1; curX = W/2; velX = 0;
  ammo = 5; stones = []; obs = [];
  state = 'play';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').style.display = 'none';
  updateAmmoUI();
  lastT = performance.now();
  requestAnimationFrame(loop);
}

function gameOver() {
  state = 'menu';
  document.getElementById('over-screen').style.display = 'flex';
  document.getElementById('final-score').innerText = Math.floor(score);
}

function loop(t) {
  if(state !== 'play') return;
  const dt = Math.min((t - lastT) / 1000, 0.1);
  lastT = t;

  // --- PHYSICS ENGINE ---
  const tx = (targetLane * LANE_W) + (LANE_W / 2);
  const force = (tx - curX) * SPRING;
  const resistance = velX * DAMP;
  velX += (force - resistance) * dt;
  curX += velX * dt;

  // Progression
  speed += 2 * dt;
  dist += speed * dt * 0.1;
  score = dist * 2;

  // Spawning
  spawnT -= dt;
  if(spawnT <= 0) {
    obs.push({
      x: (Math.floor(Math.random()*3) * LANE_W) + LANE_W/2,
      y: -50,
      r: 20 + Math.random()*20,
      c: Math.random() > 0.1 ? '#ff4444' : '#00ffff' // Red = Enemy, Cyan = Ammo
    });
    spawnT = Math.max(0.4, 1.2 - (speed/500));
  }

  // Updates
  stones.forEach((s, i) => {
    s.y += s.v * dt;
    if(s.y < -20) stones.splice(i, 1);
  });

  obs.forEach((o, i) => {
    o.y += speed * dt;
    // Collision with Player
    const d = Math.hypot(o.x - curX, o.y - (H-120));
    if(d < o.r + 20) {
      if(o.c === '#00ffff') { ammo = Math.min(5, ammo + 2); updateAmmoUI(); obs.splice(i, 1); }
      else { gameOver(); }
    }
    // Collision with Stones
    stones.forEach((s, si) => {
      if(Math.hypot(o.x - s.x, o.y - s.y) < o.r + 10) {
        obs.splice(i, 1);
        stones.splice(si, 1);
        dist += 50;
      }
    });
    if(o.y > H + 50) obs.splice(i, 1);
  });

  // --- RENDER ---
  ctx.fillStyle = '#050510';
  ctx.fillRect(0,0,W,H);

  // Lanes
  ctx.strokeStyle = 'rgba(201,168,76,0.2)';
  for(let i=1; i<3; i++) {
    ctx.beginPath(); ctx.moveTo(i*LANE_W, 0); ctx.lineTo(i*LANE_W, H); ctx.stroke();
  }

  // Player (Squach)
  ctx.save();
  ctx.translate(curX, H-120);
  ctx.rotate(velX * 0.0005); // Dynamic leaning
  ctx.shadowBlur = 15; ctx.shadowColor = '#C9A84C';
  ctx.fillStyle = '#C9A84C';
  ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-8, -5, 3, 0, Math.PI*2); ctx.arc(8, -5, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Projectiles
  ctx.fillStyle = '#fff';
  stones.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, 5, 0, Math.PI*2); ctx.fill();
  });

  // Obstacles
  obs.forEach(o => {
    ctx.shadowBlur = 10; ctx.shadowColor = o.c;
    ctx.fillStyle = o.c;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
  });

  document.getElementById('score-val').innerText = Math.floor(score);
  document.getElementById('dist-val').innerText = Math.floor(dist) + 'm';

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
